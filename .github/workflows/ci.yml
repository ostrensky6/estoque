name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chrome

      - name: E2E
        run: npm run test:e2e
        env:
          # o webServer do Playwright sobe `npm run dev` com mock do Supabase;
          # estes valores são fictícios e nunca tocam o banco real.
          PLAYWRIGHT_MOCK_SUPABASE: "1"
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: output/playwright-report
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          # valores fictícios — as páginas são dinâmicas e não acessam o banco no build
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
